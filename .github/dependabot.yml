# Routine majors remain manual because MCP protocol and SDK upgrades can be
# behaviorally breaking despite a mechanically valid lockfile. Security updates
# stay eligible across major boundaries and are grouped for one review surface.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "07:00"
      timezone: "Europe/Stockholm"
    open-pull-requests-limit: 3
    groups:
      security-updates:
        applies-to: "security-updates"
        patterns:
          - "*"
      minor-and-patch:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "07:30"
      timezone: "Europe/Stockholm"
    open-pull-requests-limit: 3
    groups:
      github-actions:
        patterns:
          - "*"

  # `standalone/` deliberately has its own lockfile and is not an npm workspace. Without a second
  # update root, the isolation boundary would also hide its MCP/web/build transitive graph from
  # routine security and patch proposals.
  - package-ecosystem: "npm"
    directory: "/standalone"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "08:00"
      timezone: "Europe/Stockholm"
    open-pull-requests-limit: 3
    groups:
      security-updates:
        applies-to: "security-updates"
        patterns:
          - "*"
      minor-and-patch:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
