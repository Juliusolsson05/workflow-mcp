name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --include=dev
      # The real Codex suite and 49-turn fan-out benchmark are intentionally opt-in. Deterministic
      # fake-provider conformance is the CI oracle and requires no account credentials.
      - run: npm run check
      - run: npm audit --omit=dev
